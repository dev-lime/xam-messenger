<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAM Messenger</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <!-- Левая панель - список контактов -->
        <aside class="sidebar">
            <div class="peers-list" id="peersList">
                <!-- Контакты будут загружены сюда -->
            </div>
        </aside>

        <!-- Основная панель - чат -->
        <main class="chat">
            <!-- Верхняя панель -->
            <header class="chat-header">
                <div class="user-profile-header" id="userProfileHeader" title="Настройки профиля">
                    <div class="user-avatar-small" id="userAvatar">👤</div>
                    <div class="user-info-header">
                        <div class="user-name-header" id="userName">Не подключен</div>
                        <div class="user-address-header" id="userAddress">--</div>
                    </div>
                </div>
                <div class="status" id="status">⚫ Не в сети</div>
            </header>

            <!-- Список сообщений -->
            <div class="messages-container" id="messagesContainer">
                <!-- Кнопка загрузки старых сообщений -->
                <div class="load-more-container" id="loadMoreContainer" style="display: none;">
                    <button class="btn btn-load-more" id="loadMoreBtn">
                        ⏳ Загрузить старые сообщения
                    </button>
                </div>
                
                <div class="messages" id="messages">
                    <!-- Сообщения будут здесь -->
                </div>
            </div>

            <!-- Прикреплённые файлы -->
            <div class="attached-files" id="attachedFiles" style="display: none;"></div>

            <!-- Панель ввода -->
            <div class="input-area" id="inputArea">
                <button class="btn btn-attach" id="attachBtn" title="Прикрепить файл">📎</button>
                <textarea
                    id="messageInput"
                    placeholder="Введите сообщение..."
                    rows="1"
                ></textarea>
                <button class="btn btn-send" id="sendBtn" disabled>
                    <span>➤</span>
                </button>
            </div>

            <!-- Скрытый input для файлов -->
            <input type="file" id="fileInput" style="display: none;" multiple>
        </main>
    </div>

    <!-- Диалог подключения -->
    <dialog id="connectDialog" class="dialog">
        <div class="dialog-header">
            <h3>Добро пожаловать в XAM Messenger</h3>
        </div>
        <div class="dialog-content">
            <div class="form-group">
                <label>Ваше имя</label>
                <input type="text" id="userNameInput" placeholder="Введите имя" maxlength="20">
            </div>
            <div class="form-group">
                <label>Адрес сервера (опционально)</label>
                <input type="text" id="serverAddressInput" placeholder="192.168.1.100" maxlength="255">
            </div>
            <p class="hint">💡 Введите имя для подключения к серверу<br>
               Сервер будет найден автоматически в локальной сети<br>
               🔧 Если сервер не найден, укажите его IP адрес вручную</p>
            <div id="serverStatus" style="margin-top: 12px; font-size: 13px;">
                <span style="color: var(--text-secondary);">🔍 Поиск сервера...</span>
            </div>
        </div>
        <div class="dialog-actions">
            <button class="btn btn-primary" id="confirmConnect" disabled>Войти</button>
        </div>
    </dialog>

    <!-- Диалог настроек -->
    <dialog id="settingsDialog" class="dialog">
        <div class="dialog-header">
            <h3>Настройки профиля</h3>
        </div>
        <div class="dialog-content">
            <div class="form-group">
                <label>Ваше имя</label>
                <input type="text" id="settingsNameInput" placeholder="Ваше имя">
            </div>
            <div class="form-group">
                <label>Аватар (эмодзи)</label>
                <input type="text" id="settingsAvatarInput" placeholder="👤" maxlength="2">
            </div>
            <p class="hint">Настройки сохраняются в базе данных</p>
        </div>
        <div class="dialog-actions">
            <button class="btn" id="cancelSettings">Отмена</button>
            <button class="btn btn-primary" id="saveSettings">Сохранить</button>
        </div>
    </dialog>

    <!-- Клиент -->
    <script src="server-client.js"></script>
    <script src="app.js"></script>
</body>
</html>
