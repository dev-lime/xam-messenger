<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xam Messenger</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <!-- Левая панель - список контактов -->
        <aside class="sidebar">
            <!-- Список контактов -->
            <div class="peers-list" id="peersList">
                <!-- Контакты будут загружены сюда -->
            </div>
            
            <!-- Плавающая кнопка подключения -->
            <button class="fab fab-connect" id="connectBtn" title="Подключиться">
                <span>+</span>
            </button>
        </aside>

        <!-- Основная панель - чат -->
        <main class="chat">
            <!-- Верхняя панель -->
            <header class="chat-header">
                <div class="user-profile-header" id="userProfileHeader" title="Настройки профиля">
                    <div class="user-avatar-small" id="userAvatar">👤</div>
                    <div class="user-info-header">
                        <div class="user-name-header" id="userName">Не подключен</div>
                        <div class="user-address-header" id="userAddress">--</div>
                    </div>
                </div>
                <div class="status" id="status">⚫ Не подключен</div>
            </header>

            <!-- Список сообщений -->
            <div class="messages-container" id="messagesContainer">
                <div class="messages" id="messages">
                    <!-- Сообщения будут здесь -->
                </div>
            </div>

            <!-- Панель ввода -->
            <div class="input-area">
                <button class="btn btn-attach" id="attachBtn" title="Прикрепить файл">📎</button>
                <textarea
                    id="messageInput"
                    placeholder="Введите сообщение..."
                    rows="1"
                ></textarea>
                <button class="btn btn-send" id="sendBtn" disabled>
                    <span>➤</span>
                </button>
            </div>
            
            <!-- Скрытый input для файлов -->
            <input type="file" id="fileInput" style="display: none;">
        </main>
    </div>

    <!-- Диалог подключения -->
    <dialog id="connectDialog" class="dialog">
        <div class="dialog-header">
            <h3>Подключение к чату</h3>
        </div>
        <div class="dialog-content">
            <div class="form-group">
                <label>Ваш порт</label>
                <input type="text" id="portInput" value="8080" placeholder="8080">
            </div>
            <div class="form-group">
                <label>IP собеседника</label>
                <input type="text" id="ipInput" placeholder="192.168.1.100:8080">
            </div>
            <p class="hint">💡 Для теста на одном ПК:<br>
               Экземпляр 1: порт 8080<br>
               Экземпляр 2: порт 8081<br>
               IP собеседника: 127.0.0.1:8080</p>
        </div>
        <div class="dialog-actions">
            <button class="btn" id="cancelConnect">Отмена</button>
            <button class="btn btn-primary" id="confirmConnect">Подключиться</button>
        </div>
    </dialog>

    <!-- Диалог настроек -->
    <dialog id="settingsDialog" class="dialog">
        <div class="dialog-header">
            <h3>Настройки профиля</h3>
        </div>
        <div class="dialog-content">
            <div class="form-group">
                <label>Ваше имя</label>
                <input type="text" id="settingsNameInput" placeholder="Ваше имя">
            </div>
            <div class="form-group">
                <label>Аватар (эмодзи)</label>
                <input type="text" id="settingsAvatarInput" placeholder="👤" maxlength="2">
            </div>
            <p class="hint">Эти настройки сохранятся для следующих подключений</p>
        </div>
        <div class="dialog-actions">
            <button class="btn" id="cancelSettings">Отмена</button>
            <button class="btn btn-primary" id="saveSettings">Сохранить</button>
        </div>
    </dialog>

    <script src="app.js"></script>
</body>
</html>
