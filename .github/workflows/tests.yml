name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Тесты сервера (Rust)
  server-tests:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: "./server -> target"

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsqlite3-dev pkg-config
    
    - name: Build server
      working-directory: ./server
      run: cargo build --verbose
    
    - name: Run server tests
      working-directory: ./server
      run: cargo test --verbose

    - name: Run server tests with coverage
      uses: taiki-e/cache-cargo-install-action@v2
      with:
        tool: cargo-tarpaulin

    - name: Run coverage
      working-directory: ./server
      run: cargo tarpaulin --out Xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: ./server/coverage.xml
        flags: server
        token: ${{ secrets.CODECOV_TOKEN }}

  # Тесты клиента (JavaScript)
  client-tests:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install dependencies
      run: |
        npm ci
    
    - name: Run client tests
      run: npm test
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage/coverage-final.json
        flags: client

  # Интеграционные тесты
  integration-tests:
    runs-on: ubuntu-22.04
    needs: [server-tests, client-tests]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsqlite3-dev pkg-config
    
    - name: Install Node dependencies
      run: npm ci
    
    - name: Build server
      working-directory: ./server
      run: cargo build --release

    - name: Start server
      run: |
        ./server/target/release/xam-server &
        sleep 2

    - name: Wait for server to be ready
      run: |
        for i in {1..10}; do
          if curl -s http://localhost:8080/api/v1/users > /dev/null; then
            echo "✅ Server is ready"
            exit 0
          fi
          sleep 1
        done
        echo "❌ Server did not start"
        exit 1

    - name: Run integration tests
      run: npm run test:integration
      env:
        TEST_SERVER_URL: http://localhost:8080
        TEST_WS_URL: ws://localhost:8080/ws
    
    - name: Stop server
      if: always()
      run: |
        pkill -f xam-server || true

  # Линтинг
  lint:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsqlite3-dev pkg-config
    
    - name: Install Node dependencies
      run: npm ci
    
    - name: Run Rust fmt check
      working-directory: ./server
      run: cargo fmt --check
    
    - name: Run Rust clippy
      working-directory: ./server
      run: cargo clippy -- -D warnings
    
    - name: Run ESLint
      run: npm run lint || true

  # Сборка Tauri приложения
  tauri-build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsqlite3-dev pkg-config libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev

    - name: Install Node dependencies
      run: npm ci

    - name: Build Tauri app
      uses: tauri-apps/tauri-action@v0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        projectPath: ./src-tauri
        tauriScript: npx @tauri-apps/cli@2
