name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Тесты сервера (Rust)
  server-tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
    
    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: "./server -> target"
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsqlite3-dev pkg-config
    
    - name: Build server
      working-directory: ./server
      run: cargo build --verbose
    
    - name: Run server tests
      working-directory: ./server
      run: cargo test --verbose
    
    - name: Run server tests with coverage
      working-directory: ./server
      run: |
        cargo install cargo-tarpaulin
        cargo tarpaulin --out Xml
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./server/coverage.xml
        flags: server

  # Тесты клиента (JavaScript)
  client-tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run client tests
      run: npm test
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage/coverage-final.json
        flags: client

  # Интеграционные тесты
  integration-tests:
    runs-on: ubuntu-latest
    needs: [server-tests, client-tests]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsqlite3-dev pkg-config
    
    - name: Install Node dependencies
      run: npm ci
    
    - name: Build server
      working-directory: ./server
      run: cargo build --release
    
    - name: Start server
      run: |
        ./server/target/release/xam-server &
        sleep 2
    
    - name: Run integration tests
      run: npm run test:integration
      env:
        TEST_SERVER_URL: http://localhost:8080
        TEST_WS_URL: ws://localhost:8080/ws
    
    - name: Stop server
      if: always()
      run: |
        pkill -f xam-server || true

  # Линтинг
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsqlite3-dev pkg-config
    
    - name: Install Node dependencies
      run: npm ci
    
    - name: Run Rust fmt check
      working-directory: ./server
      run: cargo fmt --check
    
    - name: Run Rust clippy
      working-directory: ./server
      run: cargo clippy -- -D warnings
    
    - name: Run ESLint
      run: npm run lint || true

  # Сборка Tauri приложения
  tauri-build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsqlite3-dev pkg-config libwebkit2gtk-4.0-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libjavascriptcoregtk-4.0-dev libsoup2.4-dev
    
    - name: Install Node dependencies
      run: npm ci
    
    - name: Build Tauri app
      working-directory: ./src-tauri
      run: |
        cargo tauri build || echo "Tauri build requires additional configuration"
