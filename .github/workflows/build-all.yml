name: Build All Platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  APP_NAME: xam-messenger
  VERSION: ${{ github.ref_name }}

jobs:
  # ============================================
  # Linux Build
  # ============================================
  build-linux:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
    - uses: actions/checkout@v4

    - name: Get version
      id: get_version
      run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwebkit2gtk-4.1-dev \
          build-essential \
          libssl-dev \
          libgtk-3-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev \
          libjavascriptcoregtk-4.1-dev \
          libsoup-3.0-dev \
          libgdk-pixbuf2.0-dev \
          libatk1.0-dev \
          libatk-bridge2.0-dev \
          libdrm-dev \
          libxkbcommon-dev \
          libxcomposite-dev \
          libxdamage-dev \
          libxfixes-dev \
          libxrandr-dev \
          libgbm-dev \
          libpango1.0-dev \
          libasound2-dev \
          libatspi2.0-dev \
          clang \
          cmake \
          pkg-config \
          libsqlite3-dev

    - name: Install dependencies
      run: npm ci

    - name: Build server
      working-directory: ./server
      run: cargo build --release --verbose

    - name: Build Tauri app
      uses: tauri-apps/tauri-action@v0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        projectPath: ./src-tauri
        args: --release

    - name: Upload server
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.APP_NAME }}-server-linux-x64
        path: server/target/release/xam-server

    - name: Upload AppImage
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.APP_NAME }}-linux-x64.AppImage
        path: src-tauri/target/release/bundle/appimage/*.AppImage

    - name: Upload DEB
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.APP_NAME }}-linux-x64.deb
        path: src-tauri/target/release/bundle/deb/*.deb

    - name: Upload RPM
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.APP_NAME }}-linux-x64.rpm
        path: src-tauri/target/release/bundle/rpm/*.rpm

  # ============================================
  # Windows Build
  # ============================================
  build-windows:
    runs-on: windows-latest
    needs: build-linux

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install dependencies
      run: npm ci

    - name: Build server
      working-directory: ./server
      run: cargo build --release --verbose

    - name: Build Tauri app
      uses: tauri-apps/tauri-action@v0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        projectPath: ./src-tauri
        args: --release

    - name: Upload server
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.APP_NAME }}-server-windows-x64.exe
        path: server/target/release/xam-server.exe

    - name: Upload MSI
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.APP_NAME }}-windows-x64.msi
        path: src-tauri/target/release/bundle/msi/*.msi

    - name: Upload NSIS
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.APP_NAME }}-windows-x64.exe
        path: src-tauri/target/release/bundle/nsis/*.exe

    - name: Upload portable
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.APP_NAME }}-portable-windows-x64.exe
        path: src-tauri/target/release/xam-messenger.exe

  # ============================================
  # macOS Build
  # ============================================
  build-macos:
    runs-on: macos-latest
    needs: build-linux

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-apple-darwin,aarch64-apple-darwin

    - name: Install dependencies
      run: npm ci

    - name: Build server (universal binary)
      working-directory: ./server
      run: |
        cargo build --release --target x86_64-apple-darwin --verbose
        cargo build --release --target aarch64-apple-darwin --verbose
        mkdir -p target/release
        lipo -create \
          target/x86_64-apple-darwin/release/xam-server \
          target/aarch64-apple-darwin/release/xam-server \
          -output target/release/xam-server

    - name: Build Tauri app
      uses: tauri-apps/tauri-action@v0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        projectPath: ./src-tauri
        args: --release

    - name: Upload server
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.APP_NAME }}-server-macos-universal
        path: server/target/release/xam-server

    - name: Upload DMG
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.APP_NAME }}-macos-universal.dmg
        path: src-tauri/target/release/bundle/dmg/*.dmg

    - name: Upload App
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.APP_NAME }}-macos-universal.app
        path: src-tauri/target/release/bundle/macos/*.app

  # ============================================
  # Create GitHub Release
  # ============================================
  create-release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts

    - name: Create release notes
      run: |
        cat > RELEASE_NOTES.md << 'EOF'
        # XAM Messenger ${{ needs.build-linux.outputs.version }}

        ## Что нового
        - ✅ Cursor-based пагинация сообщений
        - ✅ Аватары пользователей (хранятся в БД)
        - ✅ Отправка файлов до 100MB
        - ✅ Статусы сообщений (отправлено/доставлено/прочитано)
        - ✅ Авто-обнаружение сервера в LAN

        ## Установка

        ### Windows
        - `xam-messenger-windows-x64.msi` — установщик
        - `xam-messenger-portable-windows-x64.exe` — портативная версия
        - `xam-server-windows-x64.exe` — сервер

        ### Linux
        - `xam-messenger-linux-x64.deb` — Debian/Ubuntu
        - `xam-messenger-linux-x64.rpm` — Fedora/openSUSE
        - `xam-messenger-linux-x64.AppImage` — универсальный
        - `xam-server-linux-x64` — сервер

        ### macOS
        - `xam-messenger-macos-universal.dmg` — установщик (Intel + Apple Silicon)
        - `xam-server-macos-universal` — сервер

        ## Быстрый старт
        1. Запустите сервер: `./xam-server` (или `xam-server.exe`)
        2. Откройте клиент в браузере или запустите приложение
        3. Введите имя и подключитесь

        EOF

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        body_path: RELEASE_NOTES.md
        files: ./artifacts/**/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
