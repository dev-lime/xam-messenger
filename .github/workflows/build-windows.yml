name: Build Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc

    - name: Install dependencies
      run: npm ci

    - name: Build server
      working-directory: ./server
      run: cargo build --release --verbose

    - name: Build Tauri app
      uses: tauri-apps/tauri-action@v0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        projectPath: ./src-tauri
        args: --release

    - name: Upload server artifact
      uses: actions/upload-artifact@v4
      with:
        name: xam-server-windows
        path: server/target/release/xam-server.exe

    - name: Upload MSI installer
      uses: actions/upload-artifact@v4
      with:
        name: xam-messenger-msi
        path: src-tauri/target/release/bundle/msi/*.msi

    - name: Upload NSIS installer
      uses: actions/upload-artifact@v4
      with:
        name: xam-messenger-nsis
        path: src-tauri/target/release/bundle/nsis/*.exe

    - name: Upload portable exe
      uses: actions/upload-artifact@v4
      with:
        name: xam-messenger-portable
        path: src-tauri/target/release/xam-messenger.exe
